<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for the outer shape -->
    <linearGradient id="shapeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>

    <!-- Glow gradient for neural pulses -->
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3" />
      <stop offset="60%" style="stop-color:#e94560;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0" />
    </radialGradient>

    <!-- Accent gradient for the woven G -->
    <linearGradient id="wovenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>

    <!-- Secondary accent for strands -->
    <linearGradient id="strandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533483;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:1" />
    </linearGradient>

    <!-- Neural node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0" />
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#e94560" flood-opacity="0.3"/>
    </filter>

    <!-- Soft inner glow -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ==================== UNIQUE APP SHAPE ==================== -->
  <!-- Organic "Neural Bloom" shape - a unique silhouette that's    -->
  <!-- neither circle nor square, with 6 subtle organic lobes       -->
  <!-- suggesting neural branching / synaptic growth                -->

  <!-- Outer soft shadow -->
  <path d="
    M 256 28
    C 310 28, 355 42, 390 68
    C 420 52, 452 58, 472 80
    C 492 102, 488 134, 474 160
    C 498 196, 512 238, 512 270
    C 512 310, 498 350, 474 380
    C 488 410, 492 442, 472 462
    C 452 482, 420 478, 390 464
    C 355 490, 310 504, 256 504
    C 202 504, 157 490, 122 464
    C 92 478, 60 482, 40 462
    C 20 442, 24 410, 38 380
    C 14 350, 0 310, 0 270
    C 0 238, 14 196, 38 160
    C 24 134, 20 102, 40 80
    C 60 58, 92 52, 122 68
    C 157 42, 202 28, 256 28
    Z"
    fill="rgba(233,69,96,0.08)" transform="translate(0,4)"/>

  <!-- Main unique shape - "Neural Bloom" -->
  <path id="appShape" d="
    M 256 32
    C 308 32, 352 45, 386 70
    C 415 55, 446 60, 466 80
    C 486 100, 484 130, 470 158
    C 494 192, 508 236, 508 268
    C 508 306, 494 346, 470 376
    C 484 406, 486 436, 466 456
    C 446 476, 415 474, 386 460
    C 352 486, 308 498, 256 498
    C 204 498, 160 486, 126 460
    C 97 474, 66 476, 46 456
    C 26 436, 28 406, 42 376
    C 18 346, 4 306, 4 268
    C 4 236, 18 192, 42 158
    C 28 130, 26 100, 46 80
    C 66 60, 97 55, 126 70
    C 160 45, 204 32, 256 32
    Z"
    fill="url(#shapeGrad)" filter="url(#shadow)"/>

  <!-- Subtle inner glow layer -->
  <ellipse cx="256" cy="260" rx="180" ry="180" fill="url(#glowCenter)"/>

  <!-- ==================== NEURAL NETWORK PATHS ==================== -->
  <!-- Background neural connections - subtle web pattern -->

  <!-- Outer orbital ring 1 -->
  <ellipse cx="256" cy="268" rx="190" ry="190"
    fill="none" stroke="#533483" stroke-width="0.5" stroke-opacity="0.3"
    stroke-dasharray="8,12"/>

  <!-- Outer orbital ring 2 -->
  <ellipse cx="256" cy="268" rx="160" ry="160"
    fill="none" stroke="#533483" stroke-width="0.5" stroke-opacity="0.2"
    stroke-dasharray="5,15"/>

  <!-- Neural connection lines (background web) -->
  <g stroke="#533483" stroke-width="0.8" stroke-opacity="0.25">
    <line x1="100" y1="160" x2="200" y2="220"/>
    <line x1="200" y1="220" x2="180" y2="340"/>
    <line x1="180" y1="340" x2="300" y2="380"/>
    <line x1="300" y1="380" x2="400" y2="320"/>
    <line x1="400" y1="320" x2="380" y2="200"/>
    <line x1="380" y1="200" x2="300" y2="160"/>
    <line x1="300" y1="160" x2="200" y2="220"/>
    <line x1="256" y1="268" x2="200" y2="220"/>
    <line x1="256" y1="268" x2="300" y2="160"/>
    <line x1="256" y1="268" x2="400" y2="320"/>
    <line x1="256" y1="268" x2="300" y2="380"/>
    <line x1="256" y1="268" x2="180" y2="340"/>
    <line x1="256" y1="268" x2="100" y2="160"/>
    <line x1="256" y1="268" x2="380" y2="200"/>
    <line x1="120" y1="380" x2="180" y2="340"/>
    <line x1="420" y1="150" x2="380" y2="200"/>
    <line x1="140" y1="420" x2="300" y2="380"/>
    <line x1="350" y1="430" x2="300" y2="380"/>
  </g>

  <!-- ==================== WOVEN "G" MARK ==================== -->
  <!-- The central woven G - three interlocking strands forming G -->

  <g transform="translate(256,268) scale(0.62) translate(-256,-256)">
    <!-- Strand 1 - outer arc (top-right to bottom-left) -->
    <path d="
      M 340 105
      C 390 130, 425 175, 440 230
      C 455 285, 445 340, 410 385
      C 375 430, 320 460, 260 465
      C 200 470, 145 448, 105 410
      C 65 372, 50 318, 60 262
      C 70 206, 100 158, 148 125"
      fill="none" stroke="url(#wovenGrad)" stroke-width="32"
      stroke-linecap="round" stroke-opacity="0.95"/>

    <!-- Strand 2 - inner arc (creates the woven effect) -->
    <path d="
      M 310 135
      C 355 158, 385 198, 398 248
      C 411 298, 403 348, 375 388
      C 347 428, 302 450, 255 452
      C 208 454, 165 435, 135 402
      C 105 369, 90 325, 95 280
      C 100 235, 120 195, 155 165"
      fill="none" stroke="url(#strandGrad)" stroke-width="26"
      stroke-linecap="round" stroke-opacity="0.85"/>

    <!-- Strand 3 - innermost thread -->
    <path d="
      M 285 162
      C 322 182, 350 215, 362 258
      C 374 301, 368 344, 346 378
      C 324 412, 288 433, 250 436
      C 212 439, 178 424, 153 398
      C 128 372, 115 338, 118 300
      C 121 262, 138 230, 165 205"
      fill="none" stroke="#e94560" stroke-width="18"
      stroke-linecap="round" stroke-opacity="0.7"/>

    <!-- Crossbar of the G -->
    <rect x="250" y="245" width="110" height="28" rx="14"
      fill="url(#wovenGrad)" opacity="0.95"/>

    <!-- Over-under weave intersections (light overlaps) -->
    <ellipse cx="155" cy="165" rx="18" ry="18" fill="#1a1a2e" opacity="0.5"/>
    <ellipse cx="148" cy="125" rx="16" ry="16" fill="#1a1a2e" opacity="0.4"/>
    <ellipse cx="165" cy="205" rx="14" ry="14" fill="#1a1a2e" opacity="0.3"/>
  </g>

  <!-- ==================== NEURAL NODES ==================== -->
  <!-- Glowing nodes at neural intersections -->

  <g>
    <!-- Primary nodes -->
    <circle cx="200" cy="220" r="5" fill="#e94560" opacity="0.8"/>
    <circle cx="200" cy="220" r="10" fill="url(#nodeGlow)"/>

    <circle cx="300" cy="160" r="4" fill="#e94560" opacity="0.7"/>
    <circle cx="300" cy="160" r="8" fill="url(#nodeGlow)"/>

    <circle cx="380" cy="200" r="4.5" fill="#e94560" opacity="0.75"/>
    <circle cx="380" cy="200" r="9" fill="url(#nodeGlow)"/>

    <circle cx="400" cy="320" r="5" fill="#e94560" opacity="0.8"/>
    <circle cx="400" cy="320" r="10" fill="url(#nodeGlow)"/>

    <circle cx="300" cy="380" r="4" fill="#e94560" opacity="0.7"/>
    <circle cx="300" cy="380" r="8" fill="url(#nodeGlow)"/>

    <circle cx="180" cy="340" r="4.5" fill="#e94560" opacity="0.75"/>
    <circle cx="180" cy="340" r="9" fill="url(#nodeGlow)"/>

    <!-- Secondary nodes (smaller, dimmer) -->
    <circle cx="100" cy="160" r="3" fill="#e94560" opacity="0.5"/>
    <circle cx="100" cy="160" r="6" fill="url(#nodeGlow)"/>

    <circle cx="120" cy="380" r="3" fill="#e94560" opacity="0.45"/>
    <circle cx="120" cy="380" r="6" fill="url(#nodeGlow)"/>

    <circle cx="420" cy="150" r="3" fill="#e94560" opacity="0.45"/>
    <circle cx="420" cy="150" r="6" fill="url(#nodeGlow)"/>

    <circle cx="140" cy="420" r="2.5" fill="#e94560" opacity="0.4"/>
    <circle cx="140" cy="420" r="5" fill="url(#nodeGlow)"/>

    <circle cx="350" cy="430" r="2.5" fill="#e94560" opacity="0.4"/>
    <circle cx="350" cy="430" r="5" fill="url(#nodeGlow)"/>

    <!-- Center hub node -->
    <circle cx="256" cy="268" r="6" fill="#e94560" opacity="0.9"/>
    <circle cx="256" cy="268" r="14" fill="url(#nodeGlow)"/>
  </g>

  <!-- ==================== "GWENN" TEXT ==================== -->
  <!-- App name below the mark -->
  <text x="256" y="478" text-anchor="middle"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="32" font-weight="700" letter-spacing="8"
    fill="#ffffff" opacity="0.9">GWENN</text>

  <!-- Subtle tagline -->
  <text x="256" y="496" text-anchor="middle"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="9" font-weight="400" letter-spacing="3"
    fill="#e94560" opacity="0.6">NEURAL INTELLIGENCE</text>
</svg>
